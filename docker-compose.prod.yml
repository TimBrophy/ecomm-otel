# Prod overlay — layered on top of docker-compose.yml.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile load up -d --build
#
# This is what runs on the AWS EC2 prod host (infra/aws-prod). It layers three
# things on the base stack:
#   1. deployment.environment=prod + cloud.* resource attributes, so the same
#      services show up in Kibana APM under a "prod" environment, filterable and
#      side-by-side with the local stack — one project, two environments.
#   2. restart policies, so the stack survives a host reboot.
#   3. traffic via the load-generator (started with --profile load) so the prod
#      environment actually emits telemetry.
#
# The browser/mobile simulators (profile: rum) are intentionally NOT run here —
# prod traffic is generated by the load generator, and headless Chromium fleets
# don't belong on a single prod host.

x-prod-env: &prod-env
  # Merged (not replaced) into each service's base environment map. SDKs fold
  # OTEL_RESOURCE_ATTRIBUTES into resource attributes automatically — no per-service
  # code change, standard OTel. cloud.region is interpolated from the host env.
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=prod,cloud.provider=aws,cloud.platform=aws_ec2,cloud.region=${AWS_REGION:-eu-central-1}"

services:
  collector:
    restart: unless-stopped

  zookeeper:
    restart: unless-stopped

  kafka:
    restart: unless-stopped

  feature-flag-service:
    environment: *prod-env
    restart: unless-stopped

  api-gateway:
    environment: *prod-env
    restart: unless-stopped

  product-service:
    environment: *prod-env
    restart: unless-stopped

  checkout-service:
    environment: *prod-env
    restart: unless-stopped

  order-service:
    environment: *prod-env
    restart: unless-stopped

  notification-service:
    environment: *prod-env
    restart: unless-stopped

  storefront:
    environment: *prod-env
    restart: unless-stopped

  load-generator:
    environment: *prod-env
    restart: unless-stopped
